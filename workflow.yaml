historical_scope_note: "This closed whitelist UX redesign kernel remains authoritative for its shipped outcomes only. Its plugin-scoped write_scope and forbidden_writes were task-specific, the overall consolidated project remains active and incomplete under the workspace-root parity kernel, and this historical kernel does not constrain later whole-project work."

decisions:
  - The user-facing goal is fewer clicks, clearer saved-state feedback, and reliable recovery, not literal preservation of every old ephemeral prompt.
  - The ticket-local application card is the durable recovery anchor; ephemeral messages are live workflow guidance only.
  - Ephemeral history remains visible only as compact passive section confirmations, not full answer previews and not raw prompt history.
  - Smart continuation is locked:
    - auto-advance whenever the next step can be rendered as a fresh component prompt
    - require Continue Application only when a new click is needed to open a modal or recover after a UI-delivery failure
  - The current single sessionMessage carrier in OTForms_FormSession must be removed; session state must not depend on one mutable ephemeral message.
  - Stale prompts must never remain interactive after an answer is accepted; retire them in place for button/dropdown prompts and replace them with passive history for modal prompts.
  - Saved vs unsaved failures must be distinguished:
    - if draft persistence succeeded and UI delivery failed, preserve progress and route recovery through Continue Application or the ticket card
    - if draft persistence failed, do not advance the session
  - Keep the duplicate-interaction gate, but duplicate/stale acknowledgements must use neutral recovery copy instead of red internal-error framing.
  - The persistent ticket button becomes state-aware:
    - Fill Out Application
    - Continue Application
    - Update Application
    - Application Locked
  - The start-form button keeps its existing custom-id and responder path; only its label, enabled state, and supporting embed copy change by draft/review state.
  - The ticket-managed record remains the canonical full answer transcript and must also show draft/completion state clearly enough that users and staff can tell whether progress was saved.
  - Recovery cannot rely on old ephemeral messages still being present because users may dismiss them; the ticket card must always be sufficient to resume.
  - ot-eotfs-bridge remains the source of truth for editability. When bridge state changes editability, it must trigger a ticket-card refresh instead of relying on stale card copy.
  - The user explicitly approved sequential execution across all locked slices as long as each prior slice is implemented, verified, and the kernel state is updated before promotion.

repo_grounded_clarifications:
  - OTForms_FormSession currently stores one sessionMessage and routes question/continue/finalize output through reply/update against that single message.
  - Button and dropdown responders can update the originating interaction message, while modal responders reply via followUp and cannot safely own the prior ephemeral message in the same way.
  - applyDraftResponses already persists answers before continueSession runs, which makes saved-vs-unsaved failure branching feasible without changing the answer model.
  - ensureStartFormMessage currently guarantees presence only; it does not yet relabel or re-render the existing ticket card when draft or bridge state changes.
  - AnswersManager already owns ticket-managed draft persistence and bridge sync on completed drafts, so managed-record status copy can be layered there without replacing the persistence path.
  - Existing tests cover draft merge/resume, edit hydration, start-form presence, and ticket-managed-record pagination, but they do not cover end-to-end interaction transport or timeout recovery.

execution_defaults:
  planning_cadence: planning-basis plus active, next, following, and trailing implementation-ready slices
  implementation_mode: single-agent, sequential; back-to-back execution across the locked slices is approved when the prior slice verification passes and kernel state is updated before continuing
  promotion_rule: Only one active slice may be in progress at a time. The next three slices are pre-locked and may be promoted in order without further planning if their blockers are cleared by the verified prior slice.

