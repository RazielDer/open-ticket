constraints:
  write_scope:
    - plugins/ot-dashboard/**
  forbidden_writes:
    - src/**
    - config/**
    - database/**
    - any path outside plugins/ot-dashboard/**
  hard_stop_conditions:
    - Any slice would require edits outside plugins/ot-dashboard/**.
    - The redesign would require schema changes to the managed config files.
    - The redesign would require changing locked route paths instead of layering on the documented redirects.
  repo_contracts:
    - Keep the existing Express + EJS architecture.
    - Keep `/`, `/login`, `/health`, and `/admin` route paths unchanged.
    - Keep the existing viewer-auth routes and callback paths unchanged.
    - Preserve the current save routes and submitted field names for `general`, `options`, `panels`, and `questions` unless the workflow explicitly adds a new endpoint.
    - Keep raw JSON routes at `/config/:id` working.
    - Keep transcript access rules, viewer routes, and archive behavior unchanged in this task unless a shared dashboard primitive needs a narrow compatibility adjustment.
    - Keep all changed user-facing copy locale-backed in locales/english.json.
    - Use apply_patch for file edits.

decisions:
  - Scope the first-pass redesign to `General`, `Options`, `Panels`, and `Questions`.
  - Keep raw JSON as an advanced escape hatch, not as a peer primary path.
  - Delay Home-card direct-entry cutover until the new workspaces preserve advanced-tool parity.
  - Preserve backup, export, restore, and raw-review capabilities inside the new workspaces before redirecting legacy config-detail routes.
  - Block reference-breaking delete and ID-change actions for `options` and `questions`.
  - Add explicit reorder controls and reorder endpoints for `options`, `panels`, and `questions`.
  - Keep the flat-black matte theme direction and do not reintroduce glow, glossy gradients, or hero-like marketing slabs.
  - Use `/login` as the visual reference surface for the editor density follow-up while keeping the existing warm accent.
  - Collapse only the advanced-tools tray by default once the workspace stacks; keep the inventory visible.
  - Use a conservative copy-trim pass that removes duplicated helper and meta language without changing warnings or advanced-tool reachability.
  - Keep `/admin/plugins` in the existing admin shell, but tighten it until it feels like the same restrained product family as `/login`.
  - Prefer exposing more useful add-on inventory context through denser card hierarchy before adding new workflow features.
  - Group `/admin/plugins` by operational status before considering any creator- or topic-based categorization.
  - Prefer flatter inventory rows and sectioned scan paths over nested metadata boxes when the add-on count is high.
  - Let the add-ons inventory header carry the only required page summary once the intro slab becomes redundant.
  - Keep the mobile admin rail compact enough that `/admin/plugins` reaches inventory content without an oversized preamble.
  - Treat `/admin/transcripts` like a single transcript workspace instead of a hero-plus-summary-card stack.
  - Let transcript filters and operations become secondary responsive disclosures so records stay reachable on stacked/mobile layouts.
  - Keep the next transcript pass focused on density and hierarchy rather than new transcript workflow features.
  - Replace the remaining transcript summary-card walls with denser transcript-specific scan surfaces before introducing any new grouping model.
  - Keep bulk actions near the records table, but compress them into a calmer records toolbar instead of another tall subsection slab.
  - Keep the next transcript polish pass focused on flattening nested subsection chrome and improving scan flow before the table rather than inventing new transcript groupings.
  - Preserve transcript status coverage, but integrate the records summary into the records hierarchy instead of leaving it as another bordered slab.
  - Keep bulk tooling functional and visible in-page, including select-all state sync, while reducing the toolbar's visual weight.
  - Use an equivalent authenticated transcript fixture when `127.0.0.1:3360` is unavailable to automation.
  - Let wide admin content surfaces use the shell's available content track unless a page has a concrete functional reason to stay narrower.
  - Fix add-ons/transcripts page-fill gaps through shared admin CSS rather than new route-specific layout wrappers.
  - Retire the dedicated `/admin/tickets` surface and keep only the ticket summary signals that still add value on Home and in shared health details.
  - Preserve historical `/admin/tickets` bookmarks by redirecting them to `/admin` instead of leaving a dead page or hard 404.
  - Keep the next General-specific follow-up focused on layout structure and scan flow rather than reopening the broader editor system.
  - Use the General page's wide editor lane for calmer section grouping instead of leaving every secondary section as another full-width slab.
  - Keep the General advanced-tools tray behavior intact while reducing page clutter through denser navigation, clearer stats, and a non-overlapping save row.
  - Keep the next General-specific follow-up focused on redundant copy, section compaction, and wasted vertical space rather than adding new configuration concepts.
  - Use the General header and sidebar to surface current command-entry context instead of repeating section count and navigation filler text.
  - Keep the next Options-specific follow-up focused on section visibility, layout structure, and scan flow rather than adding new editor features.
  - Fix hidden editor sections through shared dashboard CSS so the selected option type is the only visible editing path.
  - Rebalance the Options ticket editor into clearer operational subsections before considering deeper workflow changes.
  - Keep the next Options-specific follow-up focused on redundant text, warning placement, and top-stage compaction rather than new editor features.
  - Simplify the Options inventory around operator-facing name, type, and ID instead of noisy member-facing button-emoji text.
  - Move the panel-reference warning into the dependency surface and use a shared identity/dependency lane so the main ticket form starts sooner.
  - Keep the next Panels-specific follow-up focused on layout structure, preview hierarchy, and save-surface placement rather than adding new editor features.
  - Rebalance Panels around paired builder lanes so identity/embed and picker/preview stop reading like same-weight full-width slabs.
  - Sanitize saved panel embed colors through the existing client editor so invalid legacy values do not break the color input.
  - Keep the next Panels-specific follow-up focused on redundant text, summary-card compaction, and preview-surface density rather than new editor features.
  - Let the Panels top stage carry label/value status only once the visible actions and builder lanes already explain the rest.
  - Trim helper text from identity, embed, picker, preview, advanced, and save surfaces so the page stops reading like a guided utility form.
  - Keep the next Questions-specific follow-up focused on layout structure, usage hierarchy, and save-surface placement rather than adding new editor features.
  - Rebalance Questions around a paired usage/identity lane so dependency context stops reading like another same-weight full-width slab.
  - Move the active-reference warning closer to the usage surface instead of leaving it in the top stage.
  - Keep the next Questions-specific follow-up focused on redundant text, label compaction, and space trim rather than new editor features.
  - Let the Questions inventory and top stage carry shorter labels and label/value summary cards once the usage and detail lanes already explain the workflow.
  - Trim helper text from the Questions inventory, stage, usage, identity, advanced, and save surfaces so the page stops reading like a narrated utility form.
  - Replace the remaining E4 dashboard identity with EoTFS dinosaur branding: `Logo_dinosaur_herbivore_1.png` feeds `public/assets/eotfs-dashboard-favicon.png`, while `Logo_dinosaur_ver_2.png` feeds `public/assets/eotfs-login-hero.png` for the admin login only.
  - Keep the shared dashboard chrome text-only: no shared logo image, no duplicated dashboard-name kicker, no footer links, and no vendor credit copy.
  - Remove every visible dashboard `Health` / `Check health` shortcut while keeping the `/health` route available for direct operational use.
  - Keep the transcript viewer login more minimal than the admin login: no hero art, no shared header navigation, and no explanatory info-card stack.
  - Preserve auth, host routing, and transcript-access behavior; this follow-up is allowed to change shared shell markup, asset paths, copy, and tests, but not route contracts or access rules.
  - Use new asset filenames under `public/assets` for the dinosaur favicon and login hero art so browser caches do not keep the E4 icon alive.
  - Fix `globalAdmins` through a dedicated strict JSON role-ID path in the General workspace instead of widening shared list parsing behavior.
  - Recover the known legacy line-split `globalAdmins` corruption signature only when the recovery is unambiguous; do not introduce broader heuristic list repair.
  - Preserve all other General form edits on `globalAdmins` validation failure through a route-level draft view model and inline error re-render.
  - Treat `globalAdmins` as quoted role-ID strings only; reject numeric JSON IDs to avoid Discord snowflake precision loss.
  - Keep Security and Options list-editor behavior unchanged in this follow-up and prove that through regression verification.

repo_grounded_clarifications:
  - `General`, `Options`, `Panels`, `Questions`, and `Transcripts` already have dedicated visual routes under `/visual/*`.
  - `Options`, `Panels`, and `Questions` currently depend on modal-first editing and page reloads, which is the main usability bottleneck.
  - `/admin/configs/:id` currently owns raw JSON review, export, backup, and restore entry points, so direct-route cutover cannot happen until those utilities are preserved elsewhere.
  - Current array save/delete flows do not prevent option/question reference breakage on rename or delete.
  - Current array editors do not provide reorder control even though array order matters operationally.
  - A Playwright audit of `/visual/general`, `/visual/options`, `/visual/panels`, and `/visual/questions` showed the rendered editor surfaces are already shadow-free and gradient-free in the main workspace chrome.
  - On `390x844`, the first editor form section currently starts around `2658-2727px` because the stacked layout renders the shared hero, inventory, and the fully expanded advanced-tools tray before the form.
  - The shared workspace header currently duplicates the page title in both the eyebrow and heading, repeats the hero subtitle in the first stat card, and repeats the advanced-tools purpose in a third stat card.
  - The advanced-tools partial already contains a nested `Review JSON before apply` disclosure, so the outer tray collapse should reuse the shared disclosure pattern instead of inventing a second interaction model.
  - A follow-up browser audit on 2026-03-28 still found oversized workspace chrome after the density pass: desktop headers render around `279-303px`, top summary cards land around `199-223px`, and save bars still read as `188-196px` slabs.
  - At `390x844`, the first editor form now starts around `1122-1247px`, but stacked/mobile toolbars still spend too much vertical space because each action button expands to its own full-width row.
  - The current desktop split still reads slightly over-wide relative to `/login`: the workspace spans about `1385px` with a `320px` sidebar at a `1440px` viewport.
  - Several dependency and preview cards in `Options`, `Panels`, and `Questions` still duplicate their visible title through a repeated kicker line, which adds height without adding meaning.
  - The authenticated add-ons inventory currently uses the older admin-shell page-intro and card-grid pattern, so it still reads wider and taller than the tighter `/login` reference.
  - The `/admin/plugins` search control spends a full visible label row ahead of the input, which adds vertical weight without improving scan speed.
  - `buildPluginInventoryItems` already computes `assetPreview`, but the `/admin/plugins` template does not show it, so users still cannot tell which JSON files are exposed until they open the workbench.
  - A follow-up authenticated fixture audit on 2026-03-28 still showed `/dash/admin/plugins` as a single equal-weight wall of 18 add-on cards, which is the main reason the page still feels clustered.
  - Most current inventory entries report `Source` as `Manifest only`, so repeating that fact on every card adds more noise than discrimination on the main inventory page.
  - Grouping the inventory by creator would fragment the operator scan path for small and medium installations, while grouping by operational state matches the primary maintenance question more directly.
  - A final fixture audit showed the last major clutter drivers were the extra add-ons intro slab, repeated per-row fact labels, visible JSON filename previews, and the one-column mobile admin rail.
  - A March 28, 2026 fixture audit of `/dash/admin/transcripts` showed the stacked/mobile route reaching the filter section around `2008px` and the records section around `4786px` because the page layers hero, alert, summary cards, filters, filtered summary, and operations before the records.
  - The transcript list route already preserves filter state, bulk actions, return-to links, and operations queries, so the main refinement opportunity is structural layout and copy density rather than behavioral changes.
  - A March 29, 2026 ready-state fixture audit still showed `/admin/transcripts` reading as a clustered stack: the desktop workspace header was about `324px`, the filtered-summary slab about `178px`, the bulk-actions slab about `294px`, and the first table row started around `1517px`.
  - On the same March 29, 2026 fixture audit at `390x844`, the stacked layout still measured about `621px` for the header, `802px` for the filtered summary, `449px` for bulk actions, and a `3409px` table start when the stacked surfaces were open.
  - The transcript models already provide status tones for filtered-summary and operations values, but the current template renders those values as near-identical summary cards, which flattens hierarchy instead of clarifying it.
  - A second March 29, 2026 critique found the records summary and bulk tools still rendering as bordered subsections inside the records shell, while the closed `More filters` row still read like a raised block.
  - The same critique found the mobile transcript header secondary facts still stacking into extra full-width rows that added avoidable pre-table height.
  - A wide-desktop authenticated fixture audit on 2026-03-29 showed `Home` using about `1604px` of the shell track at `1920x1080`, while `/admin/plugins` stayed capped around `1220px` and `/admin/transcripts` around `1100px`.
  - Those wide-desktop gutters came from page-specific `.control-content` width caps in `public/global.css`, while `1440x900` and mobile remained stable.
  - The dedicated Tickets admin surface was isolated to one route, one nav item, one template, one locale block, and a small set of route-render tests.
  - The runtime ticket snapshot still feeds Home and shared health details, so retiring the Tickets page does not require removing ticket tracking from the dashboard runtime.
  - A March 29, 2026 live critique of `/dash/visual/general` still found the page reading more clustered than the later editor workspaces because `Status`, `Logs`, `Limits`, and the five advanced disclosures all remained in one same-weight vertical stack.
  - The same critique found the General mobile nav still spending too much height on one-column links and the sticky save bar still competing with the connection section instead of reading like a final commit row.
  - A second March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/general` still found wasted space because the header repeated section count, the sidebar still carried redundant navigation copy, the connection stage kept command modes below the main fields, and the advanced/save copy still repeated visible actions.
  - A March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/options` found the page still reading as a jumbled wall because the top stage repeated toolbar, summary, warning, and save surfaces before the form and the ticket editor still rendered as one long stack.
  - The same Options critique found a real visibility bug: `Website` and `Role` sections still rendered even when the selected option type was `ticket`, because shared card CSS was overriding the intended `hidden` state.
  - A second March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/options` found that inventory rows still surfaced noisy button-emoji text, the panel-reference warning still spent its own top-stage slab, and nearly every ticket subsection still opened with another helper paragraph.
  - A March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/panels` found the page still reading like a long utility form because identity, picker, preview, and embed all rendered as same-weight full-width slabs while the sticky save bar hovered near the top instead of closing the workflow.
  - A second March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/panels` found that the top stage, primary lane, builder lane, and save row still spent height on explanatory copy that mostly repeated visible headings, values, and preview content.
  - A March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/questions` found the page still reading like a straight utility form because usage, identity, advanced settings, and save all rendered as same-weight vertical sections while the sticky save bar hovered near the top instead of closing the workflow.
  - A second March 29, 2026 live critique of `http://127.0.0.1:3371/dash/visual/questions` found that the inventory, top stage, summary strip, usage card, and save row still spent height on helper copy and labels that repeated their visible state.
  - `public/views/partials/footer.ejs` still carries both the visible footer and the hidden `dashboard-ui-messages` payload consumed by `public/js/dashboard-ui.js`, so footer cleanup must preserve the non-visual dialog payload.
  - The dashboard favicon is currently delivered in both `public/views/partials/head.ejs` and `server/create-app.ts`, so both paths must be updated together to avoid stale E4 tab branding.
  - `public/js/login.js` only powers the `Check health` interaction on `/login`, so removing that UI should either retire the script or leave it completely unused.
  - Visible health shortcuts currently exist on `/login`, the landing/admin entry surfaces, and the authenticated utility rail.
  - `public/views/transcript-viewer-login.ejs` still renders the shared header plus the `What happens next`, `Private access`, and `Separate session` cards the user wants removed.
  - Both provided dinosaur PNG files are `2970x2331` `Format32bppArgb`, which is suitable for dashboard-local derived assets with transparency preserved.
  - `ot-html-transcripts` has an independent favicon pipeline, but this follow-up should stay scoped to `plugins/ot-dashboard/**` unless verification proves E4 branding still leaks through dashboard-served transcript pages.
  - `public/views/config-general.ejs` currently renders `globalAdmins` as pretty JSON while `server/config-service.ts` still saves that field through the loose `parseStringArray` fallback.
  - The exact production corruption shape is reproducible when a trailing-comma `globalAdmins` array falls through the newline-splitting fallback in `parseStringArray`.
  - `locales/english.json` currently labels `globalAdmins` as Discord user IDs, but the runtime checker and permission loaders consume those values as Discord role IDs.
  - `plugins/ot-local-runtime-config/index.ts` strips non-snowflake `globalAdmins` entries at runtime, so malformed saved arrays silently remove global-admin role behavior.
  - The General page script is not the culprit: `public/js/config-general.js` only tracks dirty state and submit shortcuts, and the compiled happy-path form tests already pass.
  - Security and Options do not share this exact failure path because Security intentionally parses newline/comma lists and Options parses list textareas client-side before posting JSON.
  - The dashboard runtime uses compiled server code from `dist/plugins/ot-dashboard/server/**`, so this follow-up must rebuild and verify `dist`, not only the TypeScript source.

