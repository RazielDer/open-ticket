final_verification:
  required_commands:
    - npm run build
    - node --test dist/plugins/ot-dashboard/test/app.test.js dist/plugins/ot-dashboard/test/auth.test.js dist/plugins/ot-dashboard/test/home-setup.test.js dist/plugins/ot-dashboard/test/editor-layout.test.js dist/plugins/ot-dashboard/test/operational-pages.test.js dist/plugins/ot-dashboard/test/viewer-routes.test.js dist/plugins/ot-dashboard/test/transcript-workspace.test.js dist/plugins/ot-dashboard/test/roundtrip.test.js
  required_behavior_checks:
    - `/visual/general` labels `globalAdmins` as a role-ID field and explains the expected JSON array format clearly.
    - Valid quoted role-ID JSON saves a clean string array to `config/general.json` without introducing bracket or quoted-line artifacts.
    - Invalid trailing-comma JSON returns an inline error, preserves the rest of the General form state, and does not write `config/general.json`.
    - A legacy saved `globalAdmins` corruption shape renders as a repaired JSON draft with warning and rewrites cleanly on the next successful save.
    - Unrecoverable invalid saved `globalAdmins` data does not trigger heuristic guessing; it stays visible as raw JSON with operator guidance.
    - Security multiline list inputs and Options list-editor flows still behave as before.

verification_notes:
  - Verify slice 72 before advancing to slice 73.
  - Rebuild the dashboard before running verification so `dist/plugins/ot-dashboard/server/**` reflects the source changes.
  - Use the live local General route when available; otherwise verify against the equivalent local fixture route.
  - Browser/manual checks should cover desktop and mobile widths plus valid-save, invalid-save, and legacy-recovery scenarios.

acceptance:
  - The General workspace can no longer silently corrupt `globalAdmins` into a bracket-and-quoted-line array when operators submit invalid JSON.
  - Existing legacy-corrupted `globalAdmins` values are recoverable through the General workspace when the broken shape is unambiguous.
  - The field’s copy and validation now match the runtime role-ID contract instead of incorrectly describing user IDs.
  - Invalid `globalAdmins` saves fail closed with preserved operator state, while unrelated dashboard list editors remain behaviorally unchanged.
