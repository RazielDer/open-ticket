operator_notes:
  - Allowed writes for the v2 roadmap remain limited to plugins/ot-html-transcripts/** and plugins/ot-dashboard/**.
  - Slices 01 through 22 remain historical context and are already implemented and verified.
  - Phase P14 reopens the kernel for Cloudflare-ready dual-host routing, Discord admin auth, durable auth state, a viewer-host My Transcripts portal, and tighter RBAC.
  - "`publicBaseUrl` is locked as the admin-host canonical URL and `viewerPublicBaseUrl` is locked as the viewer-host canonical URL."
  - Current guild membership is required for all viewer-host access. Staff transcript access additionally requires stored transcript role `admin` plus live `Reviewer+` eligibility.
  - "`Reviewer` is viewer-host only. `Editor` is limited to visual `Options`, `Panels`, and `Questions`. `Admin` keeps global transcript and security authority."
  - Live admin and viewer authorization must be revalidated on every authorized request with cache freshness capped at 60 seconds and fail-closed behavior on stale lookup failure.
  - Durable admin/viewer sessions, OAuth state, and rate limits now belong in a local SQLite auth store under runtime/ot-dashboard rather than MemoryStore or in-memory maps.
  - The admin security workspace is Admin-only, lives inside the current admin shell and Advanced flow, and may edit non-secret RBAC/host fields only.
  - Slice 27 is implemented and verified. Its durable auth/security audit records and live-first revalidation behavior remain part of the completed P14 baseline.
  - The user has approved sequential execution across slices 23 through 28 as long as kernel state is updated after each verified slice.
  - New admin/viewer pages must stay aligned with the existing matte dark UI: no glow, no redundant copy, no roomy layout drift.
  - Slice 28 is implemented and verified. P14 is complete, there is no active slice, and the last full four-command verification sweep passed after plugin-scope doc/test drift fixes.
  - A later whole-stack follow-on aligned to `SLICE-008A` is now reserved after P14 and will reopen transcript planning for a result-first document `2.0` contract with legacy `1.0` read support, richer ticket-form result rendering, and additive `ticket.metadata`.

hard_blockers_to_escalate:
  - Required edits outside the two plugin directories
  - Multi-node, shared-storage, or distributed-locking requirements
  - Inability to preserve current transcript-ready, transcript-error, retry, continue, or visit-button behavior
  - Inability to resolve current guild membership and role state through the running bot without src/** changes
  - Discovery that the locked Editor-only visual scope cannot be enforced without exposing raw JSON, transcript, or runtime actions
