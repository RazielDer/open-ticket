final_verification:
  status: passed
  evidence: evidence/phase-14-stricter-access-and-portal-basis.md
  required_commands:
    - npm run build
    - npm --prefix plugins/ot-dashboard run build:editor
    - node --test dist/plugins/ot-dashboard/test/app.test.js dist/plugins/ot-dashboard/test/auth.test.js dist/plugins/ot-dashboard/test/viewer-routes.test.js dist/plugins/ot-dashboard/test/transcript-workspace.test.js dist/plugins/ot-dashboard/test/operational-pages.test.js dist/plugins/ot-dashboard/test/editor-layout.test.js dist/plugins/ot-dashboard/test/roundtrip.test.js
    - node --test dist/plugins/ot-html-transcripts/test/plugin-contract.test.js dist/plugins/ot-html-transcripts/test/service.test.js dist/plugins/ot-html-transcripts/test/http.test.js dist/plugins/ot-html-transcripts/test/end-to-end.test.js
  required_behavior_checks:
    - v1 local transcript build, serve, and admin flows remain intact.
    - New operations data stays behind ot-html-transcripts:service rather than direct SQLite access.
    - Any future dashboard surface remains a consumer of service methods, not a separate source of truth.
    - No enhancement work requires edits outside plugins/ot-html-transcripts/** or plugins/ot-dashboard/**.
    - Admin and viewer routes respect canonical host boundaries and do not expose admin surfaces on the viewer host.
    - Durable auth state survives restart and admin/viewer cookies remain isolated by host.
    - Admin and viewer authorization revalidate current guild membership and live role eligibility on each authorized request.
    - My Transcripts lists only currently accessible transcripts, and stored participant role participant never grants portal access.
    - Reviewer has no admin-host access, Editor is limited to the visual Options/Panels/Questions scope, and Admin retains transcript and security authority.
    - The security workspace edits only non-secret RBAC and host-routing fields.
    - New auth, portal, and security surfaces stay aligned with the existing matte dark UI with no glow and no redundant copy.
    - Successful private viewer transcript opens record the locked access-path classification while failed or unauthorized requests remain event-free.

acceptance:
  - The controller kernel documents the completed enhancement roadmap without creating a parallel planning system.
  - Phase P14 is complete, no active slice remains, and no prepared next slice remains in this kernel.
  - The final locked verification sweep passed and is recorded in `evidence/phase-14-stricter-access-and-portal-basis.md`.
  - Historical v1 evidence remains available for reference and rollback reasoning.
  - New consolidated whole-project work should resume from the workspace-root parity kernel unless a later transcript-specific follow-on intentionally reopens this kernel.
